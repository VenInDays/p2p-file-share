name: Build and Release Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Keystore
      run: |
        echo "Generating keystore for signing..."
        keytool -genkeypair \
          -v \
          -keystore release.jks \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias p2pfileshare \
          -storepass p2pfileshare123 \
          -keypass p2pfileshare123 \
          -dname "CN=P2PFileShare, OU=Dev, O=P2PFileShare, L=Hanoi, ST=Hanoi, C=VN"

    - name: Create keystore.properties
      run: |
        echo "keyAlias=p2pfileshare" > keystore.properties
        echo "keyPassword=p2pfileshare123" >> keystore.properties
        echo "storeFile=release.jks" >> keystore.properties
        echo "storePassword=p2pfileshare123" >> keystore.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK (signed by Gradle)
      run: ./gradlew assembleRelease

    - name: Verify and Re-sign APK with v1+v2+v3
      run: |
        # Find the APK file (Gradle signs it, so it could be app-release.apk or app-release-unsigned.apk)
        APK_DIR="app/build/outputs/apk/release"
        echo "Contents of APK directory:"
        ls -la ${APK_DIR}/

        # Find the APK file
        UNSIGNED_APK="${APK_DIR}/app-release-unsigned.apk"
        SIGNED_BY_GRADLE="${APK_DIR}/app-release.apk"
        FINAL_APK="P2PFileShare-v1.0.0.apk"

        BUILD_TOOLS=$(ls -d ${ANDROID_HOME}/build-tools/* | sort -V | tail -1)
        echo "Using build-tools: $BUILD_TOOLS"

        if [ -f "${SIGNED_BY_GRADLE}" ]; then
          echo "APK was signed by Gradle: ${SIGNED_BY_GRADLE}"
          # Verify Gradle's signature first
          echo "Verifying Gradle signature..."
          ${BUILD_TOOLS}/apksigner verify -v ${SIGNED_BY_GRADLE} || true
          
          # Re-sign with explicit v1+v2+v3 to ensure all schemes
          echo "Re-signing with v1+v2+v3 to ensure all signing schemes..."
          ${BUILD_TOOLS}/zipalign -f 4 ${SIGNED_BY_GRADLE} ${APK_DIR}/app-aligned.apk
          ${BUILD_TOOLS}/apksigner sign \
            --ks release.jks \
            --ks-key-alias p2pfileshare \
            --ks-pass pass:p2pfileshare123 \
            --key-pass pass:p2pfileshare123 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out ${FINAL_APK} \
            ${APK_DIR}/app-aligned.apk
        elif [ -f "${UNSIGNED_APK}" ]; then
          echo "APK is unsigned: ${UNSIGNED_APK}"
          # Align first
          ${BUILD_TOOLS}/zipalign -f 4 ${UNSIGNED_APK} ${APK_DIR}/app-aligned.apk
          # Sign with v1+v2+v3
          ${BUILD_TOOLS}/apksigner sign \
            --ks release.jks \
            --ks-key-alias p2pfileshare \
            --ks-pass pass:p2pfileshare123 \
            --key-pass pass:p2pfileshare123 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out ${FINAL_APK} \
            ${APK_DIR}/app-aligned.apk
        else
          echo "ERROR: No APK found!"
          exit 1
        fi

        echo "Verifying final signature..."
        ${BUILD_TOOLS}/apksigner verify -v ${FINAL_APK}
        ls -la ${FINAL_APK}

    - name: Generate Release Tag
      id: tag
      run: |
        TAG="v1.0.0-build${{ github.run_number }}"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Release tag: $TAG"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: "P2P File Share ${{ steps.tag.outputs.tag }}"
        body: |
          ## P2P File Share - Auto Build

          🔗 **Tự động kết nối cùng WiFi**
          📁 **Truy cập file: Download/Edit/Delete/Upload/Create**
          🔒 **Lock This Phone - Chống truy cập từ thiết bị khác**
          🔄 **Tự khởi động khi bật máy**

          ### Cài đặt
          1. Tải APK về 2 máy
          2. Cài đặt APK
          3. Mở app, cấp quyền
          4. Kết nối cùng WiFi → Tự tìm thấy nhau
          5. Chạm vào thiết bị để duyệt file

          ### Tính năng
          - Tự động phát hiện thiết bị cùng WiFi
          - Duyệt file/thư mục trên máy khác
          - Tải file về máy mình
          - Upload file lên máy khác
          - Tạo thư mục/file mới
          - Đổi tên file
          - Xóa file/thư mục
          - Chỉnh sửa file văn bản
          - "Khóa máy này" - Chặn người khác truy cập
          - Tự chạy nền, tự khởi động khi bật máy

          **APK signed with v1 + v2 + v3**
        files: |
          P2PFileShare-v1.0.0.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
