name: Build and Release Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Keystore
      run: |
        echo "Generating keystore for signing..."
        keytool -genkeypair \
          -v \
          -keystore release.jks \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias p2pfileshare \
          -storepass p2pfileshare123 \
          -keypass p2pfileshare123 \
          -dname "CN=P2PFileShare, OU=Dev, O=P2PFileShare, L=Hanoi, ST=Hanoi, C=VN"

    - name: Create keystore.properties
      run: |
        echo "keyAlias=p2pfileshare" > keystore.properties
        echo "keyPassword=p2pfileshare123" >> keystore.properties
        echo "storeFile=release.jks" >> keystore.properties
        echo "storePassword=p2pfileshare123" >> keystore.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Re-sign APK with v1+v2+v3
      id: sign
      run: |
        APK_DIR="app/build/outputs/apk/release"
        echo "=== APK Directory Contents ==="
        ls -la ${APK_DIR}/

        SIGNED_BY_GRADLE="${APK_DIR}/app-release.apk"
        UNSIGNED_APK="${APK_DIR}/app-release-unsigned.apk"
        FINAL_APK="P2PFileShare-v1.3.0.apk"
        ALIGNED_APK="${APK_DIR}/app-aligned.apk"

        BUILD_TOOLS=$(ls -d ${ANDROID_HOME}/build-tools/* | sort -V | tail -1)
        echo "Using build-tools: $BUILD_TOOLS"

        if [ -f "${SIGNED_BY_GRADLE}" ]; then
          INPUT_APK="${SIGNED_BY_GRADLE}"
          echo "Using Gradle-signed APK"
        elif [ -f "${UNSIGNED_APK}" ]; then
          INPUT_APK="${UNSIGNED_APK}"
          echo "Using unsigned APK"
        else
          echo "ERROR: No APK found!"
          exit 1
        fi

        # Align
        echo "Aligning APK..."
        ${BUILD_TOOLS}/zipalign -f 4 ${INPUT_APK} ${ALIGNED_APK}

        # Sign with v1+v2+v3
        echo "Signing with v1+v2+v3..."
        ${BUILD_TOOLS}/apksigner sign \
          --ks release.jks \
          --ks-key-alias p2pfileshare \
          --ks-pass pass:p2pfileshare123 \
          --key-pass pass:p2pfileshare123 \
          --v1-signing-enabled true \
          --v2-signing-enabled true \
          --v3-signing-enabled true \
          --out ${FINAL_APK} \
          ${ALIGNED_APK}

        echo "=== Verifying signature ==="
        ${BUILD_TOOLS}/apksigner verify -v ${FINAL_APK}
        echo "=== APK Info ==="
        ls -lh ${FINAL_APK}

    - name: Upload signed APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: P2PFileShare-APK
        path: P2PFileShare-v1.3.0.apk

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v1.3.0-build${{ github.run_number }}"
        echo "Creating release: $TAG"

        # Delete existing release/tag if exists (for rebuilds)
        gh release delete "$TAG" --yes || true
        git tag -d "$TAG" || true
        git push origin ":refs/tags/$TAG" || true

        # Create release using gh CLI (most reliable method)
        gh release create "$TAG" \
          P2PFileShare-v1.3.0.apk \
          --title "P2P File Share $TAG" \
          --notes "## P2P File Share

        **Tự động kết nối cùng WiFi**
        **Truy cập file: Download/Edit/Delete/Upload/Create**
        **Lock This Phone - Chống truy cập từ thiết bị khác**
        **Tự khởi động khi bật máy**

        ### Hỗ trợ Android 8.0 (API 26) trở lên

        ### Cài đặt
        1. Tải APK về 2 máy
        2. Cài đặt APK (cho phép cài từ nguồn không xác định)
        3. Mở app, cấp TẤT CẢ quyền (rất quan trọng!)
        4. Kết nối cùng WiFi -> Tự tìm thấy nhau
        5. Nếu không tự tìm thấy, vào Settings lấy IP, dùng Kết nối thủ công
        6. Chạm vào thiết bị để duyệt file

        ### Tính năng
        - Tự động phát hiện thiết bị cùng WiFi (NSD/mDNS)
        - Hiển thị IP máy này trong Settings (kết nối thủ công)
        - Duyệt file/thư mục trên máy khác
        - Tải file về máy mình
        - Upload file lên máy khác
        - Tạo thư mục/file mới
        - Đổi tên file
        - Xóa file/thư mục
        - Chỉnh sửa file văn bản
        - Khóa máy này - Chặn người khác truy cập
        - Tự chạy nền, tự khởi động khi bật máy

        **APK signed with v1 + v2 + v3**
