name: Build and Release Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Keystore
      run: |
        echo "Generating keystore for signing..."
        keytool -genkeypair \
          -v \
          -keystore release.jks \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias p2pfileshare \
          -storepass p2pfileshare123 \
          -keypass p2pfileshare123 \
          -dname "CN=P2PFileShare, OU=Dev, O=P2PFileShare, L=Hanoi, ST=Hanoi, C=VN"

    - name: Create keystore.properties
      run: |
        echo "keyAlias=p2pfileshare" > keystore.properties
        echo "keyPassword=p2pfileshare123" >> keystore.properties
        echo "storeFile=release.jks" >> keystore.properties
        echo "storePassword=p2pfileshare123" >> keystore.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK (signed by Gradle)
      run: ./gradlew assembleRelease

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: signed-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Verify and Re-sign APK with v1+v2+v3
      id: sign
      run: |
        APK_DIR="app/build/outputs/apk/release"
        echo "Contents of APK directory:"
        ls -la ${APK_DIR}/

        SIGNED_BY_GRADLE="${APK_DIR}/app-release.apk"
        UNSIGNED_APK="${APK_DIR}/app-release-unsigned.apk"
        FINAL_APK="P2PFileShare-v1.0.0.apk"

        BUILD_TOOLS=$(ls -d ${ANDROID_HOME}/build-tools/* | sort -V | tail -1)
        echo "Using build-tools: $BUILD_TOOLS"

        if [ -f "${SIGNED_BY_GRADLE}" ]; then
          INPUT_APK="${SIGNED_BY_GRADLE}"
        elif [ -f "${UNSIGNED_APK}" ]; then
          INPUT_APK="${UNSIGNED_APK}"
        else
          echo "ERROR: No APK found!"
          exit 1
        fi

        # Align
        ${BUILD_TOOLS}/zipalign -f 4 ${INPUT_APK} ${APK_DIR}/app-aligned.apk

        # Sign with v1+v2+v3
        ${BUILD_TOOLS}/apksigner sign \
          --ks release.jks \
          --ks-key-alias p2pfileshare \
          --ks-pass pass:p2pfileshare123 \
          --key-pass pass:p2pfileshare123 \
          --v1-signing-enabled true \
          --v2-signing-enabled true \
          --v3-signing-enabled true \
          --out ${FINAL_APK} \
          ${APK_DIR}/app-aligned.apk

        echo "Verifying final signature..."
        ${BUILD_TOOLS}/apksigner verify -v ${FINAL_APK}
        ls -la ${FINAL_APK}

        # Set output
        echo "apk_path=${FINAL_APK}" >> $GITHUB_OUTPUT

    - name: Upload signed APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: final-signed-apk
        path: P2PFileShare-v1.0.0.apk

    - name: Create GitHub Release with APK
      run: |
        TAG="v1.0.0-build${{ github.run_number }}"
        echo "Creating release with tag: $TAG"

        # Create tag
        git tag $TAG
        git push origin $TAG

        # Create release via API
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/releases" \
          -d "{
            \"tag_name\": \"$TAG\",
            \"name\": \"P2P File Share $TAG\",
            \"body\": \"## P2P File Share\\n\\nAPK signed with v1 + v2 + v3\\n\\n### Features\\n- Auto-discover devices on same WiFi\\n- Browse/download/upload/edit/delete/rename files\\n- Create folders and files\\n- Lock This Phone feature\\n- Auto-start on boot, foreground service\\n\",
            \"draft\": false,
            \"prerelease\": false
          }")

        UPLOAD_URL=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('upload_url',''))")
        echo "Upload URL: $UPLOAD_URL"

        if [ -z "$UPLOAD_URL" ]; then
          echo "Failed to create release, response:"
          echo "$RESPONSE"
          exit 1
        fi

        # Upload APK asset
        CLEAN_URL="${UPLOAD_URL%\{?name,label\}}"
        echo "Uploading APK to: ${CLEAN_URL}?name=P2PFileShare-v1.0.0.apk"

        curl -s -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/vnd.android.package-archive" \
          --data-binary @P2PFileShare-v1.0.0.apk \
          "${CLEAN_URL}?name=P2PFileShare-v1.0.0.apk" \
          | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Uploaded: {d.get(\"name\",\"FAILED\")}, Size: {d.get(\"size\",0)}')"

    - name: Verify Release
      run: |
        sleep 5
        curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
          python3 -c "
        import json,sys
        d=json.load(sys.stdin)
        print(f'Release: {d.get(\"tag_name\",\"N/A\")}')
        for a in d.get('assets',[]):
            print(f'  Asset: {a[\"name\"]}, Size: {a[\"size\"]}, URL: {a[\"browser_download_url\"]}')
        "
