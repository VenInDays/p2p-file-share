name: Build and Release Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Keystore
      run: |
        echo "Generating keystore for signing..."
        keytool -genkeypair \
          -v \
          -keystore release.jks \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias p2pfileshare \
          -storepass p2pfileshare123 \
          -keypass p2pfileshare123 \
          -dname "CN=P2PFileShare, OU=Dev, O=P2PFileShare, L=Hanoi, ST=Hanoi, C=VN"

    - name: Create keystore.properties
      run: |
        echo "keyAlias=p2pfileshare" > keystore.properties
        echo "keyPassword=p2pfileshare123" >> keystore.properties
        echo "storeFile=release.jks" >> keystore.properties
        echo "storePassword=p2pfileshare123" >> keystore.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Re-sign APK with v1+v2+v3
      id: sign
      run: |
        APK_DIR="app/build/outputs/apk/release"
        echo "=== APK Directory Contents ==="
        ls -la ${APK_DIR}/

        SIGNED_BY_GRADLE="${APK_DIR}/app-release.apk"
        UNSIGNED_APK="${APK_DIR}/app-release-unsigned.apk"
        FINAL_APK="P2PFileShare-v1.8.0.apk"
        ALIGNED_APK="${APK_DIR}/app-aligned.apk"

        BUILD_TOOLS=$(ls -d ${ANDROID_HOME}/build-tools/* | sort -V | tail -1)
        echo "Using build-tools: $BUILD_TOOLS"

        if [ -f "${SIGNED_BY_GRADLE}" ]; then
          INPUT_APK="${SIGNED_BY_GRADLE}"
          echo "Using Gradle-signed APK"
        elif [ -f "${UNSIGNED_APK}" ]; then
          INPUT_APK="${UNSIGNED_APK}"
          echo "Using unsigned APK"
        else
          echo "ERROR: No APK found!"
          exit 1
        fi

        # Align
        echo "Aligning APK..."
        ${BUILD_TOOLS}/zipalign -f 4 ${INPUT_APK} ${ALIGNED_APK}

        # Sign with v1+v2+v3
        echo "Signing with v1+v2+v3..."
        ${BUILD_TOOLS}/apksigner sign \
          --ks release.jks \
          --ks-key-alias p2pfileshare \
          --ks-pass pass:p2pfileshare123 \
          --key-pass pass:p2pfileshare123 \
          --v1-signing-enabled true \
          --v2-signing-enabled true \
          --v3-signing-enabled true \
          --out ${FINAL_APK} \
          ${ALIGNED_APK}

        echo "=== Verifying signature ==="
        ${BUILD_TOOLS}/apksigner verify -v ${FINAL_APK}
        echo "=== APK Info ==="
        ls -lh ${FINAL_APK}

    - name: Upload signed APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: P2PFileShare-APK
        path: P2PFileShare-v1.8.0.apk

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v1.8.0-build${{ github.run_number }}"
        echo "Creating release: $TAG"

        # Delete existing release/tag if exists (for rebuilds)
        gh release delete "$TAG" --yes || true
        git tag -d "$TAG" || true
        git push origin ":refs/tags/$TAG" || true

        # Write release notes to file to avoid shell quoting issues
        cat > /tmp/notes.md << 'NOTES_EOF'
        ## P2P File Share v1.8.0

        ### Tinh nang moi
        - **Quan ly App** - Xem va go cai dat app tren thiet bi remote
        - **Dieu khien WiFi** - Bat/tat WiFi, gioi han app nhan WiFi, chong app cuon du lieu
        - **Thong ke mang** - Xem du lieu WiFi su dung moi app, tong traffic

        ### Sua loi
        - **Fix duplicate peer** - Khong con hien thi nhieu thiet bi giong nhau khi restart
        - **Fix MaterialTextView cast** - Sua loi crash khoi tao do ImageButton cast

        ### Cai tien Peer Discovery
        - Xoa peer theo host IP thay vi chi theo ten (chinh xac hon)
        - Cap nhat peer khi doi ten thiet bi
        - PeerAdapter xu ly dedup bang host + name

        ### Tinh nang cu
        - Tu dong ket noi cung WiFi (UDP Discovery + HMAC-SHA256)
        - Truy cap file: Download/Edit/Delete/Upload/Create/Copy/Move
        - Lock This Phone - Chong truy cap tu thiet bi khac
        - Remote Control - Dieu khien man hinh may khac realtime
        - ZIP Viewer - Duyet noi dung file ZIP
        - Bao mat: AES-256-GCM, API token, rate limiting
        - Tu khoi dong khi bat may

        ### Ho tro Android 8.0+ (API 26)

        APK signed with v1 + v2 + v3
        NOTES_EOF

        gh release create "$TAG" \
          P2PFileShare-v1.8.0.apk \
          --title "P2P File Share $TAG" \
          --notes-file /tmp/notes.md
