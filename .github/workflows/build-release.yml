name: Build and Release Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Keystore
      run: |
        echo "Generating keystore for signing..."
        keytool -genkeypair \
          -v \
          -keystore release.jks \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias p2pfileshare \
          -storepass p2pfileshare123 \
          -keypass p2pfileshare123 \
          -dname "CN=P2PFileShare, OU=Dev, O=P2PFileShare, L=Hanoi, ST=Hanoi, C=VN"

    - name: Create keystore.properties
      run: |
        echo "keyAlias=p2pfileshare" > keystore.properties
        echo "keyPassword=p2pfileshare123" >> keystore.properties
        echo "storeFile=release.jks" >> keystore.properties
        echo "storePassword=p2pfileshare123" >> keystore.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Re-sign APK with v1+v2+v3
      id: sign
      run: |
        APK_DIR="app/build/outputs/apk/release"
        echo "=== APK Directory Contents ==="
        ls -la ${APK_DIR}/

        SIGNED_BY_GRADLE="${APK_DIR}/app-release.apk"
        UNSIGNED_APK="${APK_DIR}/app-release-unsigned.apk"
        FINAL_APK="P2PFileShare-v1.7.0.apk"
        ALIGNED_APK="${APK_DIR}/app-aligned.apk"

        BUILD_TOOLS=$(ls -d ${ANDROID_HOME}/build-tools/* | sort -V | tail -1)
        echo "Using build-tools: $BUILD_TOOLS"

        if [ -f "${SIGNED_BY_GRADLE}" ]; then
          INPUT_APK="${SIGNED_BY_GRADLE}"
          echo "Using Gradle-signed APK"
        elif [ -f "${UNSIGNED_APK}" ]; then
          INPUT_APK="${UNSIGNED_APK}"
          echo "Using unsigned APK"
        else
          echo "ERROR: No APK found!"
          exit 1
        fi

        # Align
        echo "Aligning APK..."
        ${BUILD_TOOLS}/zipalign -f 4 ${INPUT_APK} ${ALIGNED_APK}

        # Sign with v1+v2+v3
        echo "Signing with v1+v2+v3..."
        ${BUILD_TOOLS}/apksigner sign \
          --ks release.jks \
          --ks-key-alias p2pfileshare \
          --ks-pass pass:p2pfileshare123 \
          --key-pass pass:p2pfileshare123 \
          --v1-signing-enabled true \
          --v2-signing-enabled true \
          --v3-signing-enabled true \
          --out ${FINAL_APK} \
          ${ALIGNED_APK}

        echo "=== Verifying signature ==="
        ${BUILD_TOOLS}/apksigner verify -v ${FINAL_APK}
        echo "=== APK Info ==="
        ls -lh ${FINAL_APK}

    - name: Upload signed APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: P2PFileShare-APK
        path: P2PFileShare-v1.7.0.apk

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v1.7.0-build${{ github.run_number }}"
        echo "Creating release: $TAG"

        # Delete existing release/tag if exists (for rebuilds)
        gh release delete "$TAG" --yes || true
        git tag -d "$TAG" || true
        git push origin ":refs/tags/$TAG" || true

        # Write release notes to file to avoid shell quoting issues
        cat > /tmp/notes.md << 'NOTES_EOF'
        ## P2P File Share v1.7.0

        ### Tinh nang moi
        - **UI Nang cap** - Giao dien Material Design 3 moi, hieu ung animation muot ma
        - **Chinh sua anh muot** - Xu ly anh lon khong lag (Subsampling Scale ImageView)
        - **Xem ZIP** - Duyet noi dung file ZIP truc tiep trong app
        - **Bao mat tang cuong** - Ma hoa AES-256-GCM du lieu, API token xac thuc, rate limiting
        - **Lock bao mat cao** - Lock chong crack, data ma hoa, terminal attack vo ich
        - **API Authentication** - Chi thiet bi co app moi goi duoc API (HMAC-SHA256 token)
        - **Anti-tampering** - Chong tamper, app van muot duoi tan cong
        - **Rate Limiting** - Chong brute-force, chi cho phep 60 requests/phut/IP

        ### Cai tien
        - Image viewing: Subsampling Scale ImageView thay the load full bitmap
        - ZIP viewer: liet ke, xem file trong ZIP khong can giai nen
        - Security: AES-256-GCM encryption at rest cho du lieu nhay cam
        - Security: HMAC-SHA256 token cho moi API request
        - Security: Rate limiting chong brute-force (60 req/min/IP)
        - Security: Lock mechanism chong terminal/external access
        - Security: App signature verification chong tampering
        - UI: Card-based layout, smooth animations, better icons

        ### Tinh nang cu
        - Tu dong ket noi cung WiFi (UDP Discovery + HMAC-SHA256)
        - Truy cap file: Download/Edit/Delete/Upload/Create/Copy/Move
        - Lock This Phone - Chong truy cap tu thiet bi khac
        - Remote Control - Dieu khien man hinh may khac realtime (~15-20 FPS)
        - Tu khoi dong khi bat may

        ### Ho tro Android 8.0+ (API 26)

        ### Cai dat
        1. Tai APK ve 2 may
        2. Cai dat APK (cho phep cai tu nguon khong xac dinh)
        3. Mo app, cap TAT CA quyen (rat quan trong!)
        4. Ket noi cung WiFi - Tu tim thay nhau tu dong!
        5. Cham vao thiet bi de duyet file

        APK signed with v1 + v2 + v3
        NOTES_EOF

        gh release create "$TAG" \
          P2PFileShare-v1.7.0.apk \
          --title "P2P File Share $TAG" \
          --notes-file /tmp/notes.md
